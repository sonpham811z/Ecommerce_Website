apiVersion: apps/v1
kind: Deployment
metadata:
  name: haadtech-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: haadtechacr2026.azurecr.io/haadtech-php:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP # Chỉ cho phép truy cập nội bộ trong cụm K8s
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: backend